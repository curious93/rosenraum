runConfig:
  runtime: nodejs20
  minInstances: 1
  maxInstances: 10
  concurrency: 80
  memoryMiB: 512

env:
  - variable: NEXT_PUBLIC_FIREBASE_PROJECT_ID
    value: rosenraum-app
    availability: [BUILD, RUNTIME]
  - variable: NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN
    value: rosenraum-app.firebaseapp.com
    availability: [BUILD, RUNTIME]
  - variable: NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET
    value: rosenraum-app.firebasestorage.app
    availability: [BUILD, RUNTIME]
  - variable: NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID
    value: "1088277870578"
    availability: [BUILD, RUNTIME]
  - variable: NEXT_PUBLIC_FIREBASE_API_KEY
    value: AIzaSyDQOPYUhoxmjlwhv5_ZhE1TBkclzBpfdFs
    availability: [BUILD, RUNTIME]
  - variable: NEXT_PUBLIC_FIREBASE_APP_ID
    value: 1:1088277870578:web:fca22f4fe04523c614dd6b
    availability: [BUILD, RUNTIME]
  - variable: NEXT_PUBLIC_BASE_URL
    value: https://rosenraum-1--rosenraum-app.europe-west4.hosted.app
    availability: [BUILD, RUNTIME]

  - variable: ANTHROPIC_API_KEY
    secret: ANTHROPIC_API_KEY

  # Firebase Admin (Firestore-Schreibzugriff, z.B. /api/feedback)
  - variable: FIREBASE_ADMIN_PROJECT_ID
    secret: FIREBASE_ADMIN_PROJECT_ID
  - variable: FIREBASE_ADMIN_CLIENT_EMAIL
    secret: FIREBASE_ADMIN_CLIENT_EMAIL
  - variable: FIREBASE_ADMIN_PRIVATE_KEY
    secret: FIREBASE_ADMIN_PRIVATE_KEY

  # Site-PIN-Schutz (Middleware braucht BUILD+RUNTIME? Edge: RUNTIME reicht)
  - variable: SITE_LOCK_SECRET
    secret: SITE_LOCK_SECRET

  # Admin-Dashboard: kommaseparierte Allowlist
  - variable: ADMIN_EMAILS
    value: vonbrueck@gmail.com,naiko90210@googlemail.com
    availability: [RUNTIME]
