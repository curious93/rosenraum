name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  quality:
    name: Lint, Types & Design Gates
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Design tokens in sync
        run: npm run check:tokens

      - name: No hardcoded colours
        run: npm run check:colors

      - name: Token change documented
        run: npm run check:token-doc

      - name: ESLint (inkl. JSDoc-Pflicht)
        run: npm run lint

      - name: TypeScript type check
        run: npx tsc --noEmit
        env:
          NEXT_PUBLIC_FIREBASE_PROJECT_ID: stub
          NEXT_PUBLIC_FIREBASE_API_KEY: stub
          NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: stub.firebaseapp.com
          NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: stub.firebasestorage.app
          NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: "000000000000"
          NEXT_PUBLIC_FIREBASE_APP_ID: "1:000000000000:web:stub"
          CLAUDE_OAUTH_TOKEN: stub

  test:
    name: Accessibility & Visual Regression
    runs-on: ubuntu-latest
    # Pinned Playwright image → stable Linux rendering for visual baselines.
    container:
      image: mcr.microsoft.com/playwright:v1.60.0-jammy
    env:
      # Stubs so `next dev` (Playwright webServer) boots without real secrets.
      NEXT_PUBLIC_FIREBASE_PROJECT_ID: stub
      NEXT_PUBLIC_FIREBASE_API_KEY: stub
      NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: stub.firebaseapp.com
      NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: stub.firebasestorage.app
      NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: "000000000000"
      NEXT_PUBLIC_FIREBASE_APP_ID: "1:000000000000:web:stub"
      CLAUDE_OAUTH_TOKEN: stub
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      # a11y (axe) gates hard — always fails on serious/critical violations.
      - name: Accessibility (axe)
        run: npx playwright test tests/a11y

      # Visual regression: if linux baselines exist → compare and fail on diff.
      # If missing (first run for a new platform) → seed them and pass.
      - name: Visual regression
        run: |
          if ls tests/__snapshots__/visual/screens.spec.ts/*-chromium-linux.png 2>/dev/null | grep -q .; then
            echo "Linux baselines found — comparing strictly"
            npx playwright test tests/visual
          else
            echo "No linux baselines — seeding (first run, not a failure)"
            npx playwright test tests/visual --update-snapshots=missing || true
          fi

      - name: Upload report & snapshots
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            playwright-report/
            tests/__snapshots__/
          retention-days: 14
