name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  quality:
    name: Lint · Types · Design Gates
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - run: npm run check:tokens
      - run: npm run check:colors
      - run: npm run check:token-doc
      - run: npm run lint

      - run: npx tsc --noEmit
        env:
          NEXT_PUBLIC_FIREBASE_PROJECT_ID: stub
          NEXT_PUBLIC_FIREBASE_API_KEY: stub
          NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: stub.firebaseapp.com
          NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: stub.firebasestorage.app
          NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: "000000000000"
          NEXT_PUBLIC_FIREBASE_APP_ID: "1:000000000000:web:stub"
          CLAUDE_OAUTH_TOKEN: stub
          FIREBASE_ADMIN_PROJECT_ID: stub
          FIREBASE_ADMIN_CLIENT_EMAIL: stub@stub.iam.gserviceaccount.com
          FIREBASE_ADMIN_PRIVATE_KEY: "-----BEGIN PRIVATE KEY-----\nSTUB\n-----END PRIVATE KEY-----\n"

  test:
    name: Accessibility & Visual
    runs-on: ubuntu-latest
    container:
      image: mcr.microsoft.com/playwright:v1.60.0-jammy
    env:
      NEXT_PUBLIC_FIREBASE_PROJECT_ID: stub
      NEXT_PUBLIC_FIREBASE_API_KEY: stub
      NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: stub.firebaseapp.com
      NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: stub.firebasestorage.app
      NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: "000000000000"
      NEXT_PUBLIC_FIREBASE_APP_ID: "1:000000000000:web:stub"
      CLAUDE_OAUTH_TOKEN: stub
      FIREBASE_ADMIN_PROJECT_ID: stub
      FIREBASE_ADMIN_CLIENT_EMAIL: stub@stub.iam.gserviceaccount.com
      FIREBASE_ADMIN_PRIVATE_KEY: "-----BEGIN PRIVATE KEY-----\nSTUB\n-----END PRIVATE KEY-----\n"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Accessibility (axe)
        run: npx playwright test tests/a11y

      - name: Visual regression
        run: |
          EXPECTED=6
          ACTUAL=$(ls tests/__snapshots__/visual/screens.spec.ts/*-chromium-linux.png 2>/dev/null | wc -l | tr -d ' ')
          if [ "$ACTUAL" -ge "$EXPECTED" ]; then
            npx playwright test tests/visual
          else
            npx playwright test tests/visual --update-snapshots=missing || true
          fi

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            playwright-report/
            tests/__snapshots__/
          retention-days: 7
