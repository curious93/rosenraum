name: Deploy

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]

jobs:
  deploy:
    name: Firebase App Hosting Rollout
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - name: Authenticate with Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}

      - name: Install Firebase CLI
        run: npm install -g firebase-tools@15

      - name: Trigger App Hosting rollout
        run: |
          firebase apphosting:rollouts:create rosenraum-1 \
            --project rosenraum-app \
            --git-commit ${{ github.event.workflow_run.head_sha }}
