name: Deploy

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]

jobs:
  deploy:
    name: Firebase App Hosting Rollout
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - name: Authenticate with Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}

      - name: Create build + rollout via REST API
        env:
          COMMIT_SHA: ${{ github.event.workflow_run.head_sha }}
        run: |
          TOKEN=$(gcloud auth print-access-token)
          PROJECT="rosenraum-app"
          LOCATION="europe-west4"
          BACKEND="rosenraum-1"
          BUILD_ID="build-$(date +%Y%m%d-%H%M%S)"
          BASE="https://firebaseapphosting.googleapis.com/v1beta/projects/$PROJECT/locations/$LOCATION/backends/$BACKEND"

          echo "Creating build $BUILD_ID for commit $COMMIT_SHA..."
          BUILD_OP=$(curl -s -X POST \
            -H "Authorization: Bearer $TOKEN" \
            -H "Content-Type: application/json" \
            -d "{\"source\":{\"codebase\":{\"commit\":\"$COMMIT_SHA\"}}}" \
            "$BASE/builds?buildId=$BUILD_ID")
          echo "Build API response: $BUILD_OP"
          echo "$BUILD_OP" | python3 -c "import sys,json; d=json.load(sys.stdin); sys.exit(1) if 'error' in d else print('Operation:', d.get('name','?'))" || { echo "Build creation failed (see response above)"; exit 1; }

          # Wait for build to complete (max 10 min)
          echo "Waiting for build..."
          for i in $(seq 1 60); do
            BUILD=$(curl -s -H "Authorization: Bearer $TOKEN" "$BASE/builds/$BUILD_ID")
            STATE=$(echo "$BUILD" | python3 -c "import sys,json; print(json.load(sys.stdin).get('state','UNKNOWN'))")
            echo "  Attempt $i/60: $STATE"
            if [ "$STATE" = "READY" ]; then
              break
            elif [ "$STATE" = "FAILED" ]; then
              echo "Build failed!"
              echo "$BUILD" | python3 -m json.tool
              exit 1
            fi
            sleep 10
          done

          if [ "$STATE" != "READY" ]; then
            echo "Build timed out with state: $STATE"
            exit 1
          fi

          # Create rollout
          echo "Creating rollout..."
          ROLLOUT_ID="rollout-$(date +%Y%m%d-%H%M%S)"
          ROLLOUT=$(curl -s -X POST \
            -H "Authorization: Bearer $TOKEN" \
            -H "Content-Type: application/json" \
            -d "{\"build\":\"projects/$PROJECT/locations/$LOCATION/backends/$BACKEND/builds/$BUILD_ID\"}" \
            "$BASE/rollouts?rolloutId=$ROLLOUT_ID")
          echo "$ROLLOUT" | python3 -c "import sys,json; d=json.load(sys.stdin); print('Rollout:', d.get('name','?'))"
          echo "Deploy triggered successfully"
