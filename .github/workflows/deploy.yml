name: Deploy

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]

concurrency:
  group: deploy-main
  cancel-in-progress: true

jobs:
  deploy:
    name: Firebase App Hosting
    if: github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest

    steps:
      - name: Authenticate with Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}

      - name: Deploy via App Hosting REST API
        env:
          COMMIT_SHA: ${{ github.event.workflow_run.head_sha }}
        run: |
          TOKEN=$(gcloud auth print-access-token)
          PROJECT="rosenraum-app"
          LOCATION="europe-west4"
          BACKEND="rosenraum-1"
          BASE="https://firebaseapphosting.googleapis.com/v1beta/projects/$PROJECT/locations/$LOCATION/backends/$BACKEND"
          BUILD_ID="build-$(date +%Y%m%d-%H%M%S)"

          echo "Creating build $BUILD_ID for commit $COMMIT_SHA..."
          HTTP_CODE=$(curl -s -o /tmp/build_resp.json -w "%{http_code}" -X POST \
            -H "Authorization: Bearer $TOKEN" \
            -H "Content-Type: application/json" \
            -d "{\"source\":{\"codebase\":{\"commit\":\"$COMMIT_SHA\"}}}" \
            "$BASE/builds?buildId=$BUILD_ID")
          BUILD_OP=$(cat /tmp/build_resp.json)
          echo "Build response (HTTP $HTTP_CODE): $BUILD_OP"
          if [ "$HTTP_CODE" = "409" ]; then
            echo "Another build is already queued — this deploy is superseded. Exiting cleanly."
            exit 0
          fi
          echo "$BUILD_OP" | python3 -c "import sys,json; d=json.load(sys.stdin); sys.exit(1) if 'error' in d else print('Operation:', d.get('name','?'))" || { echo "Build creation failed"; exit 1; }

          echo "Waiting for build..."
          for i in $(seq 1 60); do
            BUILD=$(curl -s -H "Authorization: Bearer $TOKEN" "$BASE/builds/$BUILD_ID")
            STATE=$(echo "$BUILD" | python3 -c "import sys,json; print(json.load(sys.stdin).get('state','UNKNOWN'))")
            echo "  [$i/60] $STATE"
            if [ "$STATE" = "READY" ]; then break; fi
            if [ "$STATE" = "FAILED" ]; then
              echo "Build failed:"
              echo "$BUILD" | python3 -m json.tool
              exit 1
            fi
            sleep 10
          done

          if [ "$STATE" != "READY" ]; then
            echo "Build timed out (state: $STATE)"
            exit 1
          fi

          ROLLOUT_ID="rollout-$(date +%Y%m%d-%H%M%S)"
          echo "Creating rollout $ROLLOUT_ID..."
          ROLLOUT=$(curl -s -X POST \
            -H "Authorization: Bearer $TOKEN" \
            -H "Content-Type: application/json" \
            -d "{\"build\":\"projects/$PROJECT/locations/$LOCATION/backends/$BACKEND/builds/$BUILD_ID\"}" \
            "$BASE/rollouts?rolloutId=$ROLLOUT_ID")
          echo "Rollout response: $ROLLOUT"
          echo "$ROLLOUT" | python3 -c "import sys,json; d=json.load(sys.stdin); sys.exit(1) if 'error' in d else print('Rollout:', d.get('name','?'))" || { echo "Rollout creation failed"; exit 1; }

          echo "Deploy triggered for commit $COMMIT_SHA"
