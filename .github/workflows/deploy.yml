name: Deploy

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]

concurrency:
  group: deploy-main
  cancel-in-progress: false

jobs:
  deploy:
    name: Firebase App Hosting
    if: github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    # Hard infrastructure ceiling — GitHub kills the job at this bound regardless of
    # what the script does. Real deploy is build (~3 min) + rollout (≤90 s). 10 min is
    # the catastrophic backstop; the internal caps below (5 min + 3 min) trip first.
    timeout-minutes: 10

    steps:
      - name: Authenticate with Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}

      - name: Deploy via App Hosting REST API
        env:
          COMMIT_SHA: ${{ github.event.workflow_run.head_sha }}
        run: |
          set -uo pipefail
          # Per-project config via GitHub repo variables — identical workflow across all
          # App Hosting projects. Set once: gh variable set FB_PROJECT/FB_LOCATION/FB_BACKEND
          # (find values via: firebase apphosting:backends:list)
          PROJECT="${{ vars.FB_PROJECT }}"
          LOCATION="${{ vars.FB_LOCATION }}"
          BACKEND="${{ vars.FB_BACKEND }}"
          if [ -z "$PROJECT" ] || [ -z "$LOCATION" ] || [ -z "$BACKEND" ]; then
            echo "::error::Missing repo variables FB_PROJECT / FB_LOCATION / FB_BACKEND — set them via 'gh variable set' (values from: firebase apphosting:backends:list)"
            exit 1
          fi
          BASE="https://firebaseapphosting.googleapis.com/v1beta/projects/$PROJECT/locations/$LOCATION/backends/$BACKEND"

          TOKEN=$(gcloud auth print-access-token) || { echo "::error::Could not mint access token"; exit 1; }

          # Poll a build/rollout resource to a TERMINAL state. Every network call is
          # hard-capped (--max-time 30) so a hung request cannot stall the loop. Only
          # SUCCEEDED/READY counts as success; FAILED/CANCELLED fails immediately;
          # exhausting the cap without a terminal state is a TRUE failure (never claim
          # an unverified success). Args: <url> <label> <max-iterations>
          poll_terminal() {
            local url="$1" label="$2" max="$3" i state
            for i in $(seq 1 "$max"); do
              state=$(curl -s --max-time 30 -H "Authorization: Bearer $TOKEN" "$url" \
                | python3 -c "import sys,json; print(json.load(sys.stdin).get('state','UNKNOWN'))" 2>/dev/null || echo UNKNOWN)
              echo "  [$i/$max] $label: $state"
              case "$state" in
                SUCCEEDED|READY) return 0 ;;
                FAILED|CANCELLED) echo "::error::$label reached terminal failure: $state"; return 1 ;;
              esac
              sleep 10
            done
            echo "::error::$label never reached a terminal state within bound (last: $state)"
            return 1
          }

          # ── Build ────────────────────────────────────────────────────────────────
          BUILD_ID="build-$(date +%Y%m%d-%H%M%S)"
          echo "Creating build $BUILD_ID for commit $COMMIT_SHA..."
          HTTP_CODE=$(curl -s --max-time 30 -o /tmp/build_resp.json -w "%{http_code}" -X POST \
            -H "Authorization: Bearer $TOKEN" \
            -H "Content-Type: application/json" \
            -d "{\"source\":{\"codebase\":{\"commit\":\"$COMMIT_SHA\"}}}" \
            "$BASE/builds?buildId=$BUILD_ID")
          BUILD_OP=$(cat /tmp/build_resp.json)
          echo "Build response (HTTP $HTTP_CODE): $BUILD_OP"
          if [ "$HTTP_CODE" = "409" ]; then
            echo "Another build is already queued — newer commit supersedes this one. Exiting cleanly."
            exit 0
          fi
          echo "$BUILD_OP" | python3 -c "import sys,json; d=json.load(sys.stdin); sys.exit(1) if 'error' in d else print('Build op:', d.get('name','?'))" || { echo "::error::Build creation rejected"; exit 1; }

          echo "Verifying build to READY (real compilation ~3 min; 5 min cap)..."
          poll_terminal "$BASE/builds/$BUILD_ID" "build" 30 || exit 1

          # ── Rollout ──────────────────────────────────────────────────────────────
          ROLLOUT_ID="rollout-$(date +%Y%m%d-%H%M%S)"
          echo "Creating rollout $ROLLOUT_ID..."
          ROLLOUT=$(curl -s --max-time 30 -X POST \
            -H "Authorization: Bearer $TOKEN" \
            -H "Content-Type: application/json" \
            -d "{\"build\":\"projects/$PROJECT/locations/$LOCATION/backends/$BACKEND/builds/$BUILD_ID\"}" \
            "$BASE/rollouts?rolloutId=$ROLLOUT_ID")
          echo "Rollout response: $ROLLOUT"
          echo "$ROLLOUT" | python3 -c "import sys,json; d=json.load(sys.stdin); sys.exit(1) if 'error' in d else print('Rollout op:', d.get('name','?'))" || { echo "::error::Rollout creation rejected"; exit 1; }

          echo "Verifying rollout to SUCCEEDED (real ≤90 s; 3 min cap)..."
          poll_terminal "$BASE/rollouts/$ROLLOUT_ID" "rollout" 18 || exit 1

          echo "✅ Deploy VERIFIED live — commit $COMMIT_SHA reached SUCCEEDED"
