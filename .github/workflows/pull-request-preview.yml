name: PR Preview

on:
  pull_request:
    branches: [main]

jobs:
  preview:
    name: Firebase Preview Channel
    runs-on: ubuntu-latest
    permissions:
      checks: write
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_FIREBASE_PROJECT_ID: rosenraum-app
          NEXT_PUBLIC_FIREBASE_API_KEY: ${{ secrets.PREVIEW_FIREBASE_API_KEY }}
          NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: rosenraum-app.firebaseapp.com
          NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: rosenraum-app.firebasestorage.app
          NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.PREVIEW_FIREBASE_MESSAGING_SENDER_ID }}
          NEXT_PUBLIC_FIREBASE_APP_ID: ${{ secrets.PREVIEW_FIREBASE_APP_ID }}
          NEXT_PUBLIC_BASE_URL: https://rosenraum-app.web.app
          CLAUDE_OAUTH_TOKEN: stub

      - name: Deploy preview channel
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_PREVIEW }}
          projectId: rosenraum-app
          expires: 7d
